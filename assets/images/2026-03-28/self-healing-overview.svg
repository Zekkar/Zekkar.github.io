<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Noto Sans TC', 'Segoe UI', sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#764ba2"/></linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f093fb"/><stop offset="100%" stop-color="#f5576c"/></linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4facfe"/><stop offset="100%" stop-color="#00f2fe"/></linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#43e97b"/><stop offset="100%" stop-color="#38f9d7"/></linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fa709a"/><stop offset="100%" stop-color="#fee140"/></linearGradient>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#bbb"/></marker>
  </defs>

  <rect width="1000" height="700" rx="16" fill="#f8f9fc"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a2e">自癒式開發流程全景</text>
  <text x="500" y="72" text-anchor="middle" font-size="15" fill="#888">需求即測試 &#xB7; 自動診斷 &#xB7; 自癒修復 &#xB7; 知識沉澱</text>

  <!-- ============ Row 1: Main Pipeline ============ -->
  <!-- Telegram -->
  <g filter="url(#s)">
    <rect x="30" y="105" width="130" height="90" rx="14" fill="url(#g1)"/>
    <text x="95" y="140" text-anchor="middle" font-size="30" fill="white">&#x1F4F1;</text>
    <text x="95" y="170" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Telegram</text>
    <text x="95" y="186" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">下達指令</text>
  </g>
  <line x1="160" y1="150" x2="190" y2="150" stroke="#bbb" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Phase 0 -->
  <g filter="url(#s)">
    <rect x="195" y="105" width="150" height="90" rx="14" fill="url(#g2)"/>
    <text x="270" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="white">PHASE 0</text>
    <text x="270" y="155" text-anchor="middle" font-size="16" font-weight="bold" fill="white">影響分析</text>
    <text x="270" y="177" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">import / Pub-Sub / API</text>
  </g>
  <line x1="345" y1="150" x2="375" y2="150" stroke="#bbb" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Phase 1 -->
  <g filter="url(#s)">
    <rect x="380" y="105" width="150" height="90" rx="14" fill="url(#g3)"/>
    <text x="455" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="white">PHASE 1</text>
    <text x="455" y="155" text-anchor="middle" font-size="16" font-weight="bold" fill="white">測試情境</text>
    <text x="455" y="177" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">BDD Feature 生成</text>
  </g>
  <line x1="530" y1="150" x2="560" y2="150" stroke="#bbb" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Phase 2 -->
  <g filter="url(#s)">
    <rect x="565" y="105" width="150" height="90" rx="14" fill="url(#g4)"/>
    <text x="640" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">PHASE 2</text>
    <text x="640" y="155" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">實作 + 驗證</text>
    <text x="640" y="177" text-anchor="middle" font-size="11" fill="rgba(0,0,0,0.45)">Brainstorm / Subagent</text>
  </g>
  <line x1="715" y1="150" x2="745" y2="150" stroke="#bbb" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- Phase 4: Self-Heal (highlighted) -->
  <g filter="url(#s)">
    <rect x="750" y="95" width="220" height="110" rx="16" fill="#1a1a2e" stroke="#f5576c" stroke-width="2.5"/>
    <text x="860" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#f5576c">PHASE 4</text>
    <text x="860" y="152" text-anchor="middle" font-size="20" font-weight="bold" fill="white">自癒驗證</text>
    <text x="860" y="175" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.6)">Seq + Tempo + Docker Logs</text>
    <text x="860" y="195" text-anchor="middle" font-size="11" fill="#f5576c">&#x267B; 最多 3 次自動修復</text>
  </g>

  <!-- Self-heal loop -->
  <path d="M860,205 C860,240 940,240 940,160 C940,115 920,100 895,100" stroke="#f5576c" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#ar)"/>

  <!-- ============ Row 2: Deploy Pipeline ============ -->
  <g filter="url(#s)">
    <rect x="30" y="260" width="940" height="110" rx="14" fill="white" stroke="#e0e6ed" stroke-width="1.5"/>
    <text x="65" y="292" font-size="17" font-weight="bold" fill="#1a1a2e">任務完成閉環</text>
    <text x="65" y="312" font-size="12" fill="#888">每次修改必須走完的 7 個步驟</text>

    <!-- Steps -->
    <rect x="55" y="325" width="110" height="35" rx="8" fill="#667eea" opacity="0.12"/>
    <text x="110" y="348" text-anchor="middle" font-size="13" fill="#667eea" font-weight="bold">VERSION +1</text>

    <text x="178" y="348" font-size="16" fill="#ccc">&#x2192;</text>

    <rect x="192" y="325" width="115" height="35" rx="8" fill="#667eea" opacity="0.12"/>
    <text x="249" y="348" text-anchor="middle" font-size="13" fill="#667eea" font-weight="bold">CHANGELOG</text>

    <text x="320" y="348" font-size="16" fill="#ccc">&#x2192;</text>

    <rect x="334" y="325" width="100" height="35" rx="8" fill="#4facfe" opacity="0.12"/>
    <text x="384" y="348" text-anchor="middle" font-size="13" fill="#4facfe" font-weight="bold">git push</text>

    <text x="447" y="348" font-size="16" fill="#ccc">&#x2192;</text>

    <rect x="461" y="325" width="130" height="35" rx="8" fill="#4facfe" opacity="0.12"/>
    <text x="526" y="348" text-anchor="middle" font-size="13" fill="#4facfe" font-weight="bold">SSH &#x2192; VM 部署</text>

    <text x="604" y="348" font-size="16" fill="#ccc">&#x2192;</text>

    <rect x="618" y="325" width="120" height="35" rx="8" fill="#43e97b" opacity="0.12"/>
    <text x="678" y="348" text-anchor="middle" font-size="13" fill="#2d8a56" font-weight="bold">Health Check</text>

    <text x="751" y="348" font-size="16" fill="#ccc">&#x2192;</text>

    <rect x="765" y="325" width="100" height="35" rx="8" fill="#f5576c" opacity="0.12"/>
    <text x="815" y="348" text-anchor="middle" font-size="13" fill="#f5576c" font-weight="bold">/self-heal</text>

    <text x="878" y="348" font-size="16" fill="#ccc">&#x2192;</text>

    <rect x="892" y="325" width="60" height="35" rx="8" fill="#43e97b"/>
    <text x="922" y="348" text-anchor="middle" font-size="14" fill="white" font-weight="bold">&#x2714;</text>
  </g>

  <!-- ============ Row 3: Self-Heal Detail ============ -->
  <g filter="url(#s)">
    <rect x="30" y="400" width="940" height="130" rx="14" fill="#1a1a2e"/>
    <text x="65" y="430" font-size="17" font-weight="bold" fill="#f5576c">/self-heal 自癒驗證流程</text>

    <!-- Step boxes -->
    <rect x="55" y="448" width="130" height="55" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="120" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#4facfe">Step 1</text>
    <text x="120" y="488" text-anchor="middle" font-size="12" fill="white">全服務健康檢查</text>

    <line x1="185" y1="475" x2="210" y2="475" stroke="rgba(255,255,255,0.3)" stroke-width="2" marker-end="url(#ar)"/>

    <rect x="215" y="448" width="130" height="55" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="280" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#4facfe">Step 2</text>
    <text x="280" y="488" text-anchor="middle" font-size="12" fill="white">Seq 錯誤查詢</text>

    <line x1="345" y1="475" x2="370" y2="475" stroke="rgba(255,255,255,0.3)" stroke-width="2" marker-end="url(#ar)"/>

    <rect x="375" y="448" width="130" height="55" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="440" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#f093fb">Step 3</text>
    <text x="440" y="488" text-anchor="middle" font-size="12" fill="white">Tempo 追蹤</text>

    <line x1="505" y1="475" x2="530" y2="475" stroke="rgba(255,255,255,0.3)" stroke-width="2" marker-end="url(#ar)"/>

    <rect x="535" y="448" width="130" height="55" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="600" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffa94d">Step 4-5</text>
    <text x="600" y="488" text-anchor="middle" font-size="12" fill="white">自動修復 + 部署</text>

    <line x1="665" y1="475" x2="690" y2="475" stroke="rgba(255,255,255,0.3)" stroke-width="2" marker-end="url(#ar)"/>

    <rect x="695" y="448" width="130" height="55" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <text x="760" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#43e97b">Step 6</text>
    <text x="760" y="488" text-anchor="middle" font-size="12" fill="white">重新驗證</text>

    <line x1="825" y1="475" x2="850" y2="475" stroke="rgba(255,255,255,0.3)" stroke-width="2" marker-end="url(#ar)"/>

    <rect x="855" y="448" width="95" height="55" rx="10" fill="rgba(67,233,123,0.2)" stroke="#43e97b"/>
    <text x="902" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#43e97b">Step 7-8</text>
    <text x="902" y="488" text-anchor="middle" font-size="12" fill="#43e97b">報告</text>

    <!-- Loop arrow -->
    <path d="M760,503 C760,520 600,520 600,503" stroke="#f5576c" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#ar)"/>
    <text x="680" y="518" text-anchor="middle" font-size="10" fill="#f5576c">失敗 &#x2192; 重試（max 3）</text>
  </g>

  <!-- ============ Row 4: Knowledge ============ -->
  <g filter="url(#s)">
    <rect x="30" y="560" width="940" height="115" rx="14" fill="#fefcf3" stroke="#e8dbb5" stroke-width="1.5"/>
    <text x="65" y="592" font-size="17" font-weight="bold" fill="#8a7540">PHASE 5: 知識沉澱</text>
    <text x="65" y="614" font-size="13" fill="#a08c50">每個 bug 提煉成防護規則，寫入 CLAUDE.md &#x2192; AI 每次開發自動遵守</text>

    <!-- Rule tags - 2 rows -->
    <rect x="55" y="628" width="120" height="28" rx="6" fill="#e8dbb5"/>
    <text x="115" y="647" text-anchor="middle" font-size="11" fill="#6b5b2e">共享狀態過濾</text>

    <rect x="185" y="628" width="120" height="28" rx="6" fill="#e8dbb5"/>
    <text x="245" y="647" text-anchor="middle" font-size="11" fill="#6b5b2e">參數明確傳遞</text>

    <rect x="315" y="628" width="110" height="28" rx="6" fill="#e8dbb5"/>
    <text x="370" y="647" text-anchor="middle" font-size="11" fill="#6b5b2e">三重守衛</text>

    <rect x="435" y="628" width="130" height="28" rx="6" fill="#e8dbb5"/>
    <text x="500" y="647" text-anchor="middle" font-size="11" fill="#6b5b2e">Enum 全域同步</text>

    <rect x="575" y="628" width="120" height="28" rx="6" fill="#e8dbb5"/>
    <text x="635" y="647" text-anchor="middle" font-size="11" fill="#6b5b2e">API 即時讀取</text>

    <rect x="705" y="628" width="130" height="28" rx="6" fill="#e8dbb5"/>
    <text x="770" y="647" text-anchor="middle" font-size="11" fill="#6b5b2e">Pub/Sub 掃描</text>

    <rect x="845" y="628" width="110" height="28" rx="6" fill="#e8dbb5"/>
    <text x="900" y="647" text-anchor="middle" font-size="11" fill="#6b5b2e">部署後檢查</text>
  </g>
</svg>