    <line x1="130" y1="330" x2="148" y2="330" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" marker-end="url(#ar)"/>

    <rect x="153" y="308" width="100" height="45" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
    <text x="203" y="326" text-anchor="middle" font-size="10" fill="#4facfe" font-weight="bold">Step 2</text>
    <text x="203" y="343" text-anchor="middle" font-size="11" fill="white">Seq 錯誤</text>

    <line x1="253" y1="330" x2="271" y2="330" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" marker-end="url(#ar)"/>

    <rect x="276" y="308" width="100" height="45" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
    <text x="326" y="326" text-anchor="middle" font-size="10" fill="#f093fb" font-weight="bold">Step 3</text>
    <text x="326" y="343" text-anchor="middle" font-size="11" fill="white">Tempo 追蹤</text>

    <line x1="376" y1="330" x2="394" y2="330" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" marker-end="url(#ar)"/>

    <rect x="399" y="308" width="100" height="45" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
    <text x="449" y="326" text-anchor="middle" font-size="10" fill="#ffa94d" font-weight="bold">Step 4</text>
    <text x="449" y="343" text-anchor="middle" font-size="11" fill="white">判斷根因</text>

    <line x1="499" y1="330" x2="517" y2="330" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" marker-end="url(#ar)"/>

    <rect x="522" y="308" width="100" height="45" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
    <text x="572" y="326" text-anchor="middle" font-size="10" fill="#ffa94d" font-weight="bold">Step 5</text>
    <text x="572" y="343" text-anchor="middle" font-size="11" fill="white">自動修復</text>

    <line x1="622" y1="330" x2="640" y2="330" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" marker-end="url(#ar)"/>

    <rect x="645" y="308" width="60" height="45" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
    <text x="675" y="326" text-anchor="middle" font-size="10" fill="#43e97b" font-weight="bold">Step 6</text>
    <text x="675" y="343" text-anchor="middle" font-size="11" fill="#43e97b">驗證</text>

    <line x1="705" y1="330" x2="723" y2="330" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" marker-end="url(#ar)"/>

    <rect x="728" y="308" width="50" height="45" rx="8" fill="rgba(67,233,123,0.15)" stroke="#43e97b"/>
    <text x="753" y="335" text-anchor="middle" font-size="14" fill="#43e97b">&#x1F4CB;</text>
    <text x="753" y="349" text-anchor="middle" font-size="9" fill="#43e97b">報告</text>

    <!-- Loop -->
    <path d="M675,353 C675,370 449,370 449,353" stroke="#f5576c" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
    <text x="562" y="367" text-anchor="middle" font-size="9" fill="#f5576c">失敗 &#x2192; 重試 (max 3)</text>
  </g>

  <!-- ===== Row 4: Knowledge ===== -->
  <g filter="url(#s)">
    <rect x="10" y="388" width="780" height="50" rx="12" fill="#fefcf3" stroke="#e8dbb5"/>
    <text x="35" y="412" font-size="14" font-weight="bold" fill="#8a7540">PHASE 5: 知識沉澱</text>
    <text x="245" y="412" font-size="12" fill="#a08c50">每個 bug &#x2192; 防護規則 &#x2192; CLAUDE.md &#x2192; AI 自動遵守</text>

    <rect x="520" y="398" width="75" height="24" rx="5" fill="#e8dbb5"/>
    <text x="557" y="415" text-anchor="middle" font-size="9" fill="#6b5b2e">狀態過濾</text>
    <rect x="600" y="398" width="75" height="24" rx="5" fill="#e8dbb5"/>
    <text x="637" y="415" text-anchor="middle" font-size="9" fill="#6b5b2e">三重守衛</text>
    <rect x="680" y="398" width="95" height="24" rx="5" fill="#e8dbb5"/>
    <text x="727" y="415" text-anchor="middle" font-size="9" fill="#6b5b2e">PubSub 掃描</text>
  </g>

  <!-- ===== Row 5: Telegram Sequence ===== -->
  <g filter="url(#s)">
    <rect x="10" y="455" width="780" height="55" rx="12" fill="url(#g1)" opacity="0.9"/>
    <text x="400" y="480" text-anchor="middle" font-size="15" font-weight="bold" fill="white">&#x1F4F1; Telegram &#x2194; Claude Code &#x2194; VM (192.168.50.194)</text>
    <text x="400" y="500" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">任何裝置下達指令 &#xB7; 不需開 IDE &#xB7; 設計決策在 Telegram 確認 &#xB7; 程式碼撰寫/部署/驗證全自動</text>
  </g>
</svg>