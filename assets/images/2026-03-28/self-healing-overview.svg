    <text x="597" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PHASE 3</text>
    <text x="597" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="white">E2E</text>
    <text x="597" y="130" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Playwright</text>
  </g>
  <line x1="647" y1="104" x2="662" y2="104" stroke="#bbb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Phase 4: Self-Heal -->
  <g filter="url(#s)">
    <rect x="667" y="62" width="123" height="84" rx="14" fill="#1a1a2e" stroke="#f5576c" stroke-width="2"/>
    <text x="728" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#f5576c">PHASE 4</text>
    <text x="728" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="white">自癒驗證</text>
    <text x="728" y="126" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">Seq + Tempo</text>
    <text x="728" y="140" text-anchor="middle" font-size="10" fill="#f5576c">max 3 次修復</text>
  </g>

  <!-- ===== Row 2: Deploy Pipeline ===== -->
  <g filter="url(#s)">
    <rect x="10" y="168" width="780" height="80" rx="12" fill="white" stroke="#e0e6ed"/>
    <text x="35" y="196" font-size="15" font-weight="bold" fill="#1a1a2e">任務完成閉環</text>

    <rect x="30" y="210" width="90" height="30" rx="6" fill="#667eea" opacity="0.12"/>
    <text x="75" y="230" text-anchor="middle" font-size="12" fill="#667eea" font-weight="bold">版號 +1</text>

    <text x="130" y="230" font-size="14" fill="#ccc">&#x2192;</text>

    <rect x="142" y="210" width="100" height="30" rx="6" fill="#667eea" opacity="0.12"/>
    <text x="192" y="230" text-anchor="middle" font-size="12" fill="#667eea" font-weight="bold">CHANGELOG</text>

    <text x="252" y="230" font-size="14" fill="#ccc">&#x2192;</text>

    <rect x="264" y="210" width="80" height="30" rx="6" fill="#4facfe" opacity="0.12"/>
    <text x="304" y="230" text-anchor="middle" font-size="12" fill="#4facfe" font-weight="bold">git push</text>

    <text x="354" y="230" font-size="14" fill="#ccc">&#x2192;</text>

    <rect x="366" y="210" width="110" height="30" rx="6" fill="#4facfe" opacity="0.12"/>
    <text x="421" y="230" text-anchor="middle" font-size="12" fill="#4facfe" font-weight="bold">SSH 部署 VM</text>

    <text x="486" y="230" font-size="14" fill="#ccc">&#x2192;</text>

    <rect x="498" y="210" width="105" height="30" rx="6" fill="#43e97b" opacity="0.12"/>
    <text x="550" y="230" text-anchor="middle" font-size="12" fill="#2d8a56" font-weight="bold">Health Check</text>

    <text x="613" y="230" font-size="14" fill="#ccc">&#x2192;</text>

    <rect x="625" y="210" width="90" height="30" rx="6" fill="#f5576c" opacity="0.12"/>
    <text x="670" y="230" text-anchor="middle" font-size="12" fill="#f5576c" font-weight="bold">/self-heal</text>

    <text x="725" y="230" font-size="14" fill="#ccc">&#x2192;</text>

    <rect x="737" y="210" width="40" height="30" rx="6" fill="#43e97b"/>
    <text x="757" y="231" text-anchor="middle" font-size="16" fill="white">&#x2714;</text>
  </g>

  <!-- ===== Row 3: Self-Heal Steps ===== -->
  <g filter="url(#s)">
    <rect x="10" y="268" width="780" height="100" rx="12" fill="#1a1a2e"/>
    <text x="35" y="294" font-size="15" font-weight="bold" fill="#f5576c">/self-heal 自癒流程</text>

    <rect x="30" y="308" width="100" height="45" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
    <text x="80" y="326" text-anchor="middle" font-size="10" fill="#4facfe" font-weight="bold">Step 1</text>
