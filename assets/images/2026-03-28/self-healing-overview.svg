<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans TC', 'Segoe UI', sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#764ba2"/></linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f093fb"/><stop offset="100%" stop-color="#f5576c"/></linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4facfe"/><stop offset="100%" stop-color="#00f2fe"/></linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#43e97b"/><stop offset="100%" stop-color="#38f9d7"/></linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fa709a"/><stop offset="100%" stop-color="#fee140"/></linearGradient>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#bbb"/></marker>
  </defs>

  <rect width="800" height="520" rx="12" fill="#f8f9fc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">自癒式開發流程</text>
  <text x="400" y="50" text-anchor="middle" font-size="13" fill="#888">需求即測試 &#xB7; 自動診斷 &#xB7; 自癒修復 &#xB7; 知識沉澱</text>

  <!-- ===== Row 1: 6 Phases ===== -->
  <!-- Telegram -->
  <g filter="url(#s)">
    <rect x="10" y="68" width="100" height="72" rx="12" fill="url(#g1)"/>
    <text x="60" y="96" text-anchor="middle" font-size="24" fill="white">&#x1F4F1;</text>
    <text x="60" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Telegram</text>
    <text x="60" y="133" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">下達指令</text>
  </g>
  <line x1="110" y1="104" x2="128" y2="104" stroke="#bbb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Phase 0 -->
  <g filter="url(#s)">
    <rect x="133" y="68" width="115" height="72" rx="12" fill="url(#g2)"/>
    <text x="190" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PHASE 0</text>
    <text x="190" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="white">影響分析</text>
    <text x="190" y="130" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">import / PubSub</text>
  </g>
  <line x1="248" y1="104" x2="266" y2="104" stroke="#bbb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Phase 1 -->
  <g filter="url(#s)">
    <rect x="271" y="68" width="115" height="72" rx="12" fill="url(#g3)"/>
    <text x="328" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PHASE 1</text>
    <text x="328" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="white">測試情境</text>
    <text x="328" y="130" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">BDD 生成</text>
  </g>
  <line x1="386" y1="104" x2="404" y2="104" stroke="#bbb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Phase 2 -->
  <g filter="url(#s)">
    <rect x="409" y="68" width="115" height="72" rx="12" fill="url(#g4)"/>
    <text x="466" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">PHASE 2</text>
    <text x="466" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">實作驗證</text>
    <text x="466" y="130" text-anchor="middle" font-size="10" fill="rgba(0,0,0,0.4)">Subagent</text>
  </g>
  <line x1="524" y1="104" x2="542" y2="104" stroke="#bbb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Phase 3 -->
